name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing deploy secret::$name is not configured"
              missing=1
            fi
          done
          exit "$missing"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Rsync to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh_opts="-i ~/.ssh/id_ed25519 -p ${port} -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
          ssh ${ssh_opts} "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -avz --delete \
            -e "ssh ${ssh_opts}" \
            dist/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
