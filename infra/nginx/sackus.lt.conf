# /etc/nginx/sites-available/sackus.lt
# symlink: ln -s /etc/nginx/sites-available/sackus.lt /etc/nginx/sites-enabled/
# reload:  nginx -t && systemctl reload nginx
#
# Assumes Let's Encrypt cert already issued for sackus.lt + www.sackus.lt:
#   certbot --nginx -d sackus.lt -d www.sackus.lt

server {
    listen 80;
    listen [::]:80;
    server_name sackus.lt www.sackus.lt;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://sackus.lt$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.sackus.lt;

    ssl_certificate     /etc/letsencrypt/live/sackus.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sackus.lt/privkey.pem;

    return 301 https://sackus.lt$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sackus.lt;

    root /var/www/sackus.lt;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/sackus.lt/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sackus.lt/privkey.pem;

    add_header X-Frame-Options          SAMEORIGIN always;
    add_header X-Content-Type-Options   nosniff    always;
    add_header Referrer-Policy          strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Hashed asset bundles — long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # User-uploaded photos / docs
    location /media/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML pages — short cache, must revalidate
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri $uri/ $uri.html =404;
    }

    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
